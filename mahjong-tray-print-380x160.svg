<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="380mm" height="160mm" viewBox="0 0 380 160" font-family="Arial, Helvetica, sans-serif">

  <defs>
    <!-- brushed brass background -->
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9be82"/>
      <stop offset="0.5" stop-color="#c9a763"/>
      <stop offset="1" stop-color="#d3b170"/>
    </linearGradient>
    <!-- tile-shaped pocket: 25 x 32 mm, R3 corners, finger notch R5 at bottom -->
    <path id="hole" d="M 3,0 H 22 A 3 3 0 0 1 25,3 V 29 A 3 3 0 0 1 22,32 H 17.5 A 5 5 0 0 1 7.5,32 H 3 A 3 3 0 0 1 0,29 V 3 A 3 3 0 0 1 3,0 Z"/>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#241c12"/>
    </marker>
  </defs>

  <!-- ================= OUTLINE (board cut, 380 x 160, R8) ================= -->
  <g id="LAYER-outline-cut">
    <rect x="0.35" y="0.35" width="379.3" height="159.3" rx="8" fill="url(#brass)" stroke="#7a5f33" stroke-width="0.7"/>
  </g>

  <!-- ================= POCKETS (cut depth 5 mm) ================= -->
  <g id="LAYER-pockets-depth-5mm" fill="#a4874e" stroke="#6e5628" stroke-width="0.5">
    <!-- hand rack row 1 (slots 1-7) -->
    <use xlink:href="#hole" x="16" y="40"/>
    <use xlink:href="#hole" x="44.5" y="40"/>
    <use xlink:href="#hole" x="73" y="40"/>
    <use xlink:href="#hole" x="101.5" y="40"/>
    <use xlink:href="#hole" x="130" y="40"/>
    <use xlink:href="#hole" x="158.5" y="40"/>
    <use xlink:href="#hole" x="187" y="40"/>
    <!-- hand rack row 2 (slots 8-14) -->
    <use xlink:href="#hole" x="16" y="84"/>
    <use xlink:href="#hole" x="44.5" y="84"/>
    <use xlink:href="#hole" x="73" y="84"/>
    <use xlink:href="#hole" x="101.5" y="84"/>
    <use xlink:href="#hole" x="130" y="84"/>
    <use xlink:href="#hole" x="158.5" y="84"/>
    <use xlink:href="#hole" x="187" y="84"/>
    <!-- pass 3 -->
    <use xlink:href="#hole" x="265.5" y="39.5"/>
    <use xlink:href="#hole" x="296.5" y="39.5"/>
    <use xlink:href="#hole" x="327.5" y="39.5"/>
    <!-- receive 3 -->
    <use xlink:href="#hole" x="265.5" y="100"/>
    <use xlink:href="#hole" x="296.5" y="100"/>
    <use xlink:href="#hole" x="327.5" y="100"/>
  </g>

  <!-- ================= ARTWORK (printed / engraved) ================= -->
  <g id="LAYER-artwork" fill="#241c12">

    <!-- ~quick tips bar ~-->
    <g id="quick-tips">
      <rect x="10" y="6" width="50" height="11" rx="5.5" fill="#241c12"/>
      <!-- bulb icon -->
      <circle cx="17" cy="10.8" r="2.1" fill="none" stroke="#e8d9a8" stroke-width="0.7"/>
      <rect x="15.9" y="13.1" width="2.2" height="1.6" rx="0.5" fill="#e8d9a8"/>
      <path d="M 17,6.4 v-1.2 M 13.4,7.6 l-0.9,-0.9 M 20.6,7.6 l0.9,-0.9 M 12.8,10.8 h-1.3 M 21.2,10.8 h1.3" stroke="#e8d9a8" stroke-width="0.6" stroke-linecap="round"/>
      <text x="23" y="12.6" font-size="4.4" font-weight="bold" fill="#f2e6c2" letter-spacing="0.3">QUICK TIPS</text>

      <text x="68" y="10.6" font-size="3.3" font-weight="bold">• 1st: RIGHT →</text>
      <text x="71" y="15.4" font-size="3.3" font-weight="bold">ACROSS → LEFT</text>

      <text x="128" y="10.6" font-size="3.3" font-weight="bold">• Optional 2nd:</text>
      <text x="131" y="15.4" font-size="3.3" font-weight="bold">LEFT → ACROSS → RIGHT</text>

      <text x="212" y="10.6" font-size="3.3" font-weight="bold">• Courtesy Pass:</text>
      <text x="215" y="15.4" font-size="3.3" font-weight="bold">0-3 across</text>

      <text x="280" y="13" font-size="3.3" font-weight="bold">• East starts with 14</text>
    </g>

    <!-- ~hand rack ~-->
    <g id="hand-rack">
      <rect x="10" y="21" width="206" height="107" rx="4" fill="none" stroke="#241c12" stroke-width="0.8"/>
      <text x="113" y="29.5" font-size="6" font-weight="bold" text-anchor="middle" letter-spacing="1">HAND RACK</text>
      <!-- numbers row 1 -->
      <text x="28.5" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">1</text>
      <text x="57" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">2</text>
      <text x="85.5" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">3</text>
      <text x="114" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">4</text>
      <text x="142.5" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">5</text>
      <text x="171" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">6</text>
      <text x="199.5" y="37.5" font-size="4.5" font-weight="bold" text-anchor="middle">7</text>
      <!-- numbers row 2 -->
      <text x="28.5" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">8</text>
      <text x="57" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">9</text>
      <text x="85.5" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">10</text>
      <text x="114" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">11</text>
      <text x="142.5" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">12</text>
      <text x="171" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">13</text>
      <text x="199.5" y="126.5" font-size="4.5" font-weight="bold" text-anchor="middle">14</text>
      <!-- east's 14th tile tag (yellow) above slot 14 -->
      <rect x="186.5" y="78" width="26" height="5" rx="1.4" fill="#e6c23a" stroke="#241c12" stroke-width="0.35"/>
      <text x="199.5" y="81.6" font-size="2" font-weight="bold" text-anchor="middle">EAST'S 14TH TILE</text>
    </g>

    <!-- pick 3 arrow (rack -> pass box) -->
    <text x="231" y="39" font-size="3.8" font-weight="bold" text-anchor="middle">PICK 3</text>
    <path d="M 219,43 H 241" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

    <!-- ~pass 3 ~-->
    <g id="pass3">
      <rect x="246" y="21" width="126" height="59" rx="4" fill="none" stroke="#241c12" stroke-width="0.8"/>
      <text x="309" y="29.5" font-size="5.5" font-weight="bold" text-anchor="middle" letter-spacing="1">PASS 3</text>
      <text x="278" y="36.8" font-size="4" font-weight="bold" text-anchor="middle">P1</text>
      <text x="309" y="36.8" font-size="4" font-weight="bold" text-anchor="middle">P2</text>
      <text x="340" y="36.8" font-size="4" font-weight="bold" text-anchor="middle">P3</text>
    </g>

    <!-- pass-out arrow -->
    <text x="330" y="87.5" font-size="3.6" font-weight="bold" text-anchor="middle">PASS 3</text>
    <path d="M 310,84 v3 q 0,3 3,3 h 42 q 5,0 5,5 v 2" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

    <!-- ~receive 3 ~-->
    <g id="receive3">
      <text x="285" y="91" font-size="5.5" font-weight="bold" text-anchor="middle" letter-spacing="1">RECEIVE 3</text>
      <text x="278" y="97.5" font-size="4" font-weight="bold" text-anchor="middle">R1</text>
      <text x="309" y="97.5" font-size="4" font-weight="bold" text-anchor="middle">R2</text>
      <text x="340" y="97.5" font-size="4" font-weight="bold" text-anchor="middle">R3</text>
    </g>

    <!-- draw 3 (up into receive) -->
    <path d="M 296,142.5 v-3.5" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>
    <text x="299" y="142.8" font-size="3.5" font-weight="bold">DRAW 3</text>

    <!-- add to hand arrow (receive -> rack) -->
    <text x="113" y="136.6" font-size="4" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ADD TO HAND</text>
    <path d="M 262,135 H 144" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

    <!-- ~bottom step bar ~-->
    <g id="steps">
      <rect x="10" y="145.5" width="362" height="12.5" rx="6.2" fill="none" stroke="#241c12" stroke-width="0.8"/>

      <circle cx="94.7" cy="151.7" r="3.2" fill="#241c12"/>
      <text x="94.7" y="153.1" font-size="3.6" font-weight="bold" text-anchor="middle" fill="#f2e6c2">1</text>
      <text x="100.1" y="153.2" font-size="4.3" font-weight="bold">PICK 3</text>
      <path d="M 118.9,151.7 h 6" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

      <circle cx="134.1" cy="151.7" r="3.2" fill="#241c12"/>
      <text x="134.1" y="153.1" font-size="3.6" font-weight="bold" text-anchor="middle" fill="#f2e6c2">2</text>
      <text x="139.5" y="153.2" font-size="4.3" font-weight="bold">PASS 3</text>
      <path d="M 159.8,151.7 h 6" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

      <circle cx="175" cy="151.7" r="3.2" fill="#241c12"/>
      <text x="175" y="153.1" font-size="3.6" font-weight="bold" text-anchor="middle" fill="#f2e6c2">3</text>
      <text x="180.4" y="153.2" font-size="4.3" font-weight="bold">RETURN</text>
      <path d="M 203.2,151.7 h 6" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

      <circle cx="218.4" cy="151.7" r="3.2" fill="#241c12"/>
      <text x="218.4" y="153.1" font-size="3.6" font-weight="bold" text-anchor="middle" fill="#f2e6c2">4</text>
      <text x="223.8" y="153.2" font-size="4.3" font-weight="bold">DRAW 3</text>
      <path d="M 245.1,151.7 h 6" fill="none" stroke="#241c12" stroke-width="0.9" marker-end="url(#ah)"/>

      <circle cx="260.3" cy="151.7" r="3.2" fill="#241c12"/>
      <text x="260.3" y="153.1" font-size="3.6" font-weight="bold" text-anchor="middle" fill="#f2e6c2">5</text>
      <text x="265.7" y="153.2" font-size="4.3" font-weight="bold">ADD TO HAND</text>
    </g>
  </g>
</svg>
